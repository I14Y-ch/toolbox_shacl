name: toolbox-shacl
services:
- name: web
  environment_slug: python
  github:
    branch: main
    deploy_on_push: true
    repo: I14Y-ch/toolbox_shacl
  health_check:
    http_path: /health
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    success_threshold: 1
    failure_threshold: 3
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  source_dir: /
  envs:
  - key: PYTHONUNBUFFERED
    value: "1"
  - key: PORT
    value: "8080"
